---
# tasks file for roles/install-metallb
- name: Add MetalLB Helm repository
  command: helm repo add metallb https://metallb.github.io/metallb
  register: helm_repo_add
  changed_when: "'has been added' in helm_repo_add.stdout"

- name: Update Helm repositories
  command: helm repo update
  changed_when: false

- name: Check if MetalLB is already installed
  command: helm status metallb -n metallb-system
  register: metallb_check
  ignore_errors: yes
  changed_when: false

- name: Install MetalLB via Helm
  command: helm install metallb metallb/metallb -n metallb-system --create-namespace
  when: metallb_check.rc != 0

- name: Wait for MetalLB Controller to be ready
  command: kubectl wait --namespace metallb-system --for=condition=ready pod -l app.kubernetes.io/component=controller --timeout=120s
  changed_when: false

- name: Wait for MetalLB Speakers to be ready
  command: kubectl wait --namespace metallb-system --for=condition=ready pod -l app.kubernetes.io/component=speaker --timeout=120s
  changed_when: false

- name: Create MetalLB CRDs manifest from template
  template:
    src: metallb-config.yaml.j2
    dest: /tmp/metallb-config.yaml

- name: Apply MetalLB IP Pool and L2Advertisement
  command: kubectl apply -f /tmp/metallb-config.yaml
  register: apply_crds
  changed_when: "'created' in apply_crds.stdout or 'configured' in apply_crds.stdout"
