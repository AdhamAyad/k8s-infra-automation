---
# tasks file for roles/cluster-prep
- name: Disable swap immediately
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Disable swap permanently in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Set SELinux to permissive mode
  ansible.posix.selinux:
    state: permissive
    policy: targeted
  when: ansible_os_family == "RedHat"
  ignore_errors: true

- name: Disable SELinux in config
  replace:
    path: /etc/selinux/config
    regexp: '^SELINUX=enforcing$'
    replace: 'SELINUX=permissive'
  when: ansible_os_family == "RedHat"
  ignore_errors: true

- name: Load kernel modules for k8s
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl parameters
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/k8s.conf
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }

- name: Map node IPs to hostnames
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item]['ansible_host'] }} {{ item }}"
    state: present
  loop: "{{ groups['all'] }}"
- name: Get network details to set static IP
  set_fact:
    iface: "{{ ansible_default_ipv4.interface }}"
    ip_addr: "{{ ansible_default_ipv4.address }}"
    gateway: "{{ ansible_default_ipv4.gateway }}"

