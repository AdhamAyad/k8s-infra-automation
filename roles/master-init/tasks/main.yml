---
# tasks file for roles/master-init
- name: Initialize Kubernetes cluster with Calico-compatible CIDR
  shell: |
    kubeadm init \
      --apiserver-advertise-address={{ ansible_host }} \
      --pod-network-cidr=192.168.0.0/16 \
      --ignore-preflight-errors=NumCPU,Mem
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    mode: '0755'
    owner: ubuntu
    group: ubuntu

- name: Copy admin.conf to user's kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu

- name: Set ownership of kube config
  file:
    path: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu

- name: Install Calico Tigera Operator
  become: no
  command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/tigera-operator.yaml --server-side --force-conflicts
  register: tigera_out
  failed_when:
    - tigera_out.rc != 0
    - '"AlreadyExists" not in tigera_out.stderr'

- name: Install Calico Custom Resources
  become: no
  command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.26.1/manifests/custom-resources.yaml --server-side --force-conflicts
  register: calico_out
  failed_when:
    - calico_out.rc != 0
    - '"AlreadyExists" not in calico_out.stderr'

- name: Extra pause for Calico stabilization
  pause:
    minutes: 2

- name: Generate join command for workers
  shell: kubeadm token create --print-join-command
  register: join_command_raw

- name: Set join command as a fact
  set_fact:
    join_command: "{{ join_command_raw.stdout }}"
